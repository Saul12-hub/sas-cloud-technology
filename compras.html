<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo de Compras</title>

<link rel="stylesheet" href="compras.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header class="header">
  <h2><i class="fa-solid fa-cart-shopping"></i> Módulo de Compras</h2>
</header>

<div class="container">

  <!-- FORMULARIO COMPRA -->
  <div class="card">

    <h3>Registrar Compra</h3>

    <form>

      <div class="grid">

        <div class="input-box">
          <label>Proveedor</label>
          <input type="text" placeholder="Nombre del proveedor">
        </div>

        <div class="input-box">
          <label>Fecha</label>
          <input type="date">
        </div>

        <div class="input-box">
          <label>Número de factura</label>
          <input type="text" placeholder="FAC-0001">
        </div>
        
        <div class="input-box">
          <label>Serie de factura</label>
          <input type="text" placeholder="FAC-0001">
        </div>

        <div class="input-box">
          <label>UUID de factura</label>
          <input type="text" placeholder="FAC-0001">
        </div>

      </div>

      <hr>

      <h4>Productos</h4>

      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Costo Unitario</th>
            <th>Subtotal</th>
            <th>Acción</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td><input type="text" placeholder="Producto"></td>
            <td><input type="number" value="1"></td>
            <td><input type="number" value="0.00"></td>
            <td><input type="text" disabled></td>
            <td><button type="button" class="btn-danger"><i class="fa fa-trash"></i></button></td>
          </tr>
        </tbody>
      </table>

      <button type="button" class="btn-add">
        <i class="fa fa-plus"></i> Agregar Producto
      </button>

      <div class="total">
        <h3>Total: Q0.00</h3>
      </div>

      <button type="submit" class="btn-save">
        Guardar Compra
      </button>

    </form>

  </div>

  <!-- LISTADO -->
  <div class="card">

    <h3>Historial de Compras</h3>

    <table class="list">
      <thead>
        <tr>
          <th>#</th>
          <th>Proveedor</th>
          <th>Fecha</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Proveedor ABC</td>
          <td>2026-06-01</td>
          <td>Q1,250.00</td>
          <td><span class="badge">Pagado</span></td>
          <td>
            <button class="btn-view"><i class="fa fa-eye"></i></button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

</div>

</body>
</html>
